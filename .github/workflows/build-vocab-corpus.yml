name: Build Vocabulary Corpus

# Builds vocab_bundled.db (SQLite + FTS5 + sqlite-vec) from the bundled
# corpus sources, runs Nomic embeddings over every term, and uploads the
# result as a workflow artifact. The Electron build pulls the artifact
# at release time so end users get the full hybrid retrieval experience
# (BM25 + cosine) instead of the BM25-only fallback.
#
# Triggers:
#   - manual dispatch (for ad-hoc rebuilds while iterating on sources)
#   - push to main when corpus sources change (auto-refresh)
#   - tag push starting with "v" (cuts a release-aligned corpus)

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'scripts/build_vocab_corpus/**'
      - '.github/workflows/build-vocab-corpus.yml'

permissions:
  contents: write   # required for action-gh-release

jobs:
  build:
    name: Assemble corpus
    runs-on: [self-hosted, jongodb]
    # Embedding 339K terms via Nomic on a CPU-only ubuntu-latest runner
    # takes 60-150 min depending on runner load. 90 was too tight (saw
    # 91-min timeouts cancel both v0.64.2 and v0.64.3 corpus builds).
    # 180 gives headroom; if a build is still running at 180 something
    # is genuinely wedged.
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache corpus source downloads
        uses: actions/cache@v4
        with:
          path: assets/vocab_corpus_cache
          # Bust cache when source modules change (new download URLs etc.)
          key: vocab-corpus-cache-${{ hashFiles('scripts/build_vocab_corpus/sources/*.py') }}
          restore-keys: |
            vocab-corpus-cache-

      - name: Cache HuggingFace embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-nomic-embed-v1-5
          restore-keys: |
            hf-nomic-

      # Cache the FULL embedded DB itself, keyed by a hash of every file
      # that influences corpus content. On hit, we skip the 60-150 min
      # embedding pass entirely — release tags that don't change corpus
      # content (e.g. pure UI bumps) finish in ~1 min instead of hours.
      # On miss, we run the full build and the cache populates for next
      # time. The "v3" suffix is a manual cache buster — bump it when
      # embedding logic changes such that previously-cached vectors are
      # no longer comparable to fresh ones.
      - name: Cache embedded corpus DB
        id: corpus-db-cache
        uses: actions/cache@v4
        with:
          path: assets/vocab_bundled.db
          # v4: schema migrated to INT8 vectors with per-dim calibration
          # scales stored in metadata. Old v3 cache (FLOAT32 vectors) is
          # incompatible with the new runtime quantization path.
          key: vocab-corpus-db-v4-${{ hashFiles('scripts/build_vocab_corpus/**/*.py') }}

      - name: Install build dependencies
        if: steps.corpus-db-cache.outputs.cache-hit != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install metaphone sqlite-vec sentence-transformers einops PyMuPDF

      - name: Build corpus with embeddings
        if: steps.corpus-db-cache.outputs.cache-hit != 'true'
        env:
          CORPUS_VERSION: ${{ github.ref_name }}
        run: |
          python -m scripts.build_vocab_corpus \
            --output assets/vocab_bundled.db \
            --csv-export-dir assets/vocab_corpus_export \
            --corpus-version "${CORPUS_VERSION:-dev}" \
            --verbose

      # Cache hit fast path needs sqlite-vec installed for the integrity
      # checks below (they probe the vec table).
      - name: Install verification dependencies (cache hit)
        if: steps.corpus-db-cache.outputs.cache-hit == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install sqlite-vec

      - name: Verify corpus integrity
        run: |
          python <<'PYEOF'
          import sqlite3, sys
          conn = sqlite3.connect("assets/vocab_bundled.db")
          cur = conn.cursor()
          (term_count,) = cur.execute("SELECT COUNT(*) FROM vocab_bundled").fetchone()
          assert term_count >= 100_000, f"corpus suspiciously small: {term_count}"
          required = ["MCWL", "MCTSSA", "MARCORSEPMAN", "MARFORPAC",
                      "ADSEP", "MARADMIN", "MARCORSYSCOM",
                      "EBITDA", "FAFSA", "NATO", "FBI"]
          missing = [t for t in required
                     if not cur.execute("SELECT 1 FROM vocab_bundled WHERE term = ? LIMIT 1", (t,)).fetchone()]
          assert not missing, f"corpus missing required terms: {missing}"
          (pron, total) = cur.execute(
              "SELECT COUNT(*) FILTER (WHERE sounds_like IS NOT NULL AND sounds_like != ''), "
              "COUNT(*) FROM vocab_bundled WHERE category='military'"
          ).fetchone()
          assert pron > 200, f"military pronunciation coverage too low: {pron}/{total}"
          print(f"Corpus integrity OK: {term_count:,} terms, {pron} military pronunciations")
          conn.close()
          PYEOF

      - name: Require embeddings on tag push
        # The build script silently degrades to BM25-only when the
        # embedder isn't importable (we hit this once: services.embedding
        # pulled SQLAlchemy → ModuleNotFoundError → 0 embeddings, but the
        # workflow still exited 0 because "no vec table" is a valid
        # graceful-degradation state). Tag pushes are user-facing
        # releases — embeddings are non-negotiable there.
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          python <<'PYEOF'
          import sqlite3, sys
          conn = sqlite3.connect("assets/vocab_bundled.db")
          try:
              import sqlite_vec
              conn.enable_load_extension(True)
              sqlite_vec.load(conn)
              (n_vec,) = conn.execute("SELECT COUNT(*) FROM vocab_bundled_vec").fetchone()
          except Exception as e:
              print(f"::error::sqlite_vec unavailable or vec table missing: {e}")
              sys.exit(1)
          (n_terms,) = conn.execute("SELECT COUNT(*) FROM vocab_bundled").fetchone()
          if n_vec < n_terms * 0.99:
              print(f"::error::Embedded only {n_vec}/{n_terms} terms (<99%) — refusing to ship corpus without embeddings on a tag push")
              sys.exit(1)
          print(f"Embeddings OK: {n_vec:,}/{n_terms:,} terms have vectors")
          conn.close()
          PYEOF

      - name: Build slim variant (BM25-only) for installer
        run: |
          python -m scripts.build_vocab_corpus.strip_embeddings \
            --source assets/vocab_bundled.db \
            --dest assets/vocab_bundled_slim.db \
            --verbose

      - name: Rename full corpus for release upload
        # Keep two clearly-distinct names so consumers can tell which is which.
        # vocab_bundled_slim.db ships in installer; vocab_bundled_full.db is
        # downloaded by users opting into hybrid retrieval.
        run: cp assets/vocab_bundled.db assets/vocab_bundled_full.db

      - name: Build tour-demo zip
        # The onboarding tour offers an opt-in sample workspace. We
        # build the zip here (cheap — no embeddings, no network) so it
        # can ride along on the same release upload.
        run: |
          pip install python-docx reportlab Pillow
          python scripts/build_tour_demo.py --output assets/tour-demo.zip --verbose

      - name: Upload corpus artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vocab-corpus-${{ github.sha }}
          path: |
            assets/vocab_bundled_full.db
            assets/vocab_bundled_slim.db
            assets/vocab_corpus_export/
          retention-days: 30
          if-no-files-found: error

      - name: Upload corpus to public releases repo (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          # Target the PUBLIC releases repo so the F1 download endpoint
          # (which points at JongoDB/verbatim-studio-releases/releases/latest/download/...)
          # resolves correctly. Uploading to this repo's own releases would
          # 404 for end users since this repo is private.
          repository: JongoDB/verbatim-studio-releases
          tag_name: ${{ github.ref_name }}
          files: |
            assets/vocab_bundled_full.db
            assets/vocab_bundled_slim.db
            assets/corpus_metadata.json
            assets/tour-demo.zip
          fail_on_unmatched_files: true
          # The Electron build workflow already creates the release in the
          # public repo via dispatched workflow; we attach corpus assets
          # to that same release. If timing is such that this runs first,
          # action-gh-release creates a draft we can flesh out later.
          token: ${{ secrets.RELEASES_TOKEN }}
