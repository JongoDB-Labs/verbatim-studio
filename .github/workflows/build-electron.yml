name: Build Electron App

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main]
    paths:
      - 'apps/electron/**'
      - 'packages/frontend/**'
      - 'packages/backend/**'
      - 'scripts/**'
      - '.github/workflows/build-electron.yml'
  workflow_dispatch:

jobs:
  # For tag pushes: trigger the build in the public releases repo
  trigger-public-build:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for release notes generation)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi

          format_bullet() {
            local msg="$1"
            local desc=$(echo "$msg" | sed 's/^[a-z]*\(([^)]*)\)\{0,1\}: //')
            local first=$(echo "${desc:0:1}" | tr '[:lower:]' '[:upper:]')
            local rest="${desc:1}"
            echo "- **${first}${rest}**"
          }

          FEATURES=""
          FIXES=""
          IMPROVEMENTS=""

          while IFS= read -r line; do
            [ -z "$line" ] && continue
            MSG="${line#* }"
            case "$MSG" in
              *"bump version"*|*"release v"*) continue ;;
            esac
            CLEAN=$(echo "$MSG" | sed 's/^feat([^)]*): /feat: /; s/^fix([^)]*): /fix: /; s/^chore([^)]*): /chore: /; s/^perf([^)]*): /perf: /')
            case "$CLEAN" in
              feat:*|feat\(*) FEATURES="${FEATURES}$(format_bullet "$MSG")"$'\n' ;;
              fix:*)           FIXES="${FIXES}$(format_bullet "$MSG")"$'\n' ;;
              perf:*|refactor:*) IMPROVEMENTS="${IMPROVEMENTS}$(format_bullet "$MSG")"$'\n' ;;
            esac
          done <<< "$(git log --oneline "$RANGE" -- . ':!docs/' ':!*.md')"

          BODY="## What's New in ${TAG}"$'\n'
          if [ -n "$FEATURES" ]; then
            BODY="${BODY}"$'\n'"### ✨ New Features"$'\n'"${FEATURES}"
          fi
          if [ -n "$FIXES" ]; then
            BODY="${BODY}"$'\n'"### 🐛 Bug Fixes"$'\n'"${FIXES}"
          fi
          if [ -n "$IMPROVEMENTS" ]; then
            BODY="${BODY}"$'\n'"### 🔧 Improvements"$'\n'"${IMPROVEMENTS}"
          fi
          if [ -z "$FEATURES" ] && [ -z "$FIXES" ] && [ -z "$IMPROVEMENTS" ]; then
            BODY="${BODY}"$'\n'"### 🔧 Improvements"$'\n'"- **Minor updates and refinements**"$'\n'
          fi
          BODY="${BODY}"$'\n'"**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}"$'\n'

          # Encode as base64 to safely transport emoji and special chars
          NOTES_B64=$(echo "$BODY" | base64)
          echo "notes_b64=$NOTES_B64" >> "$GITHUB_OUTPUT"

      - name: Check for existing manual release notes
        id: existing
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          EXISTING_BODY=$(gh release view "$TAG" --json body -q '.body' 2>/dev/null || echo "")
          if [ -n "$EXISTING_BODY" ] && ! echo "$EXISTING_BODY" | grep -q "Minor updates and refinements"; then
            echo "has_notes=true" >> "$GITHUB_OUTPUT"
            NOTES_B64=$(echo "$EXISTING_BODY" | base64)
            echo "notes_b64=$NOTES_B64" >> "$GITHUB_OUTPUT"
          else
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger build in public releases repo
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          NOTES_GENERATED: ${{ steps.notes.outputs.notes_b64 }}
          NOTES_EXISTING: ${{ steps.existing.outputs.notes_b64 }}
          HAS_EXISTING: ${{ steps.existing.outputs.has_notes }}
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        run: |
          if [ "$HAS_EXISTING" = "true" ]; then
            NOTES="$NOTES_EXISTING"
          else
            NOTES="$NOTES_GENERATED"
          fi

          gh workflow run build-electron.yml \
            --repo JongoDB/verbatim-studio-releases \
            -f tag="$TAG" \
            -f sha="$SHA" \
            -f release_notes="$NOTES"

  # For PRs: validate the build still works (no artifacts uploaded)
  validate:
    if: "!startsWith(github.ref, 'refs/tags/')"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            arch: arm64
            platform: darwin
          - os: windows-latest
            arch: x64
            platform: win32

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm --filter @verbatim/frontend build:ci

      - name: Download LiveKit Server
        shell: bash
        run: bash scripts/download-livekit.sh

      - name: Build Electron
        run: pnpm --filter @verbatim/electron build
